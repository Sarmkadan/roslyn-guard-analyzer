# Docker Compose configuration for Roslyn Guard Analyzer v2
# Supports containerized analysis, health monitoring, and CI/CD integration
# =============================================================================

services:
  analyzer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: roslyn-guard-analyzer
    image: roslyn-guard-analyzer:2.0.0
    restart: unless-stopped

    ports:
      - "8080:8080"

    # Mount source code for analysis
    volumes:
      - .:/workspace:ro
      - ./reports:/reports:rw

    # Working directory inside container
    working_dir: /workspace

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      start_period: 5s
      retries: 3

    # Environment variables
    environment:
      - DOTNET_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ANALYSIS_TIMEOUT=600
      - LOG_LEVEL=2

    # Logging configuration
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: Results viewer (requires Python)
  results-viewer:
    image: python:3.11-slim
    container_name: analyzer-results-viewer
    depends_on:
      analyzer:
        condition: service_healthy

    volumes:
      - ./reports:/reports:ro

    working_dir: /reports

    command: python3 -m http.server 9090 --bind 0.0.0.0

    ports:
      - "9090:9090"

    # Only run this if you want to view results
    profiles:
      - viewer

volumes:
  reports:
    driver: local

networks:
  default:
    name: analyzer-network
